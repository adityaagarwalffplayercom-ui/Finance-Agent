version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns: ["next", "react", "react-dom", "eslint-config-next"]
      prisma:
        patterns: ["prisma", "@prisma/client"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
